# LLM配置（三层路由）
# primary: 用户主对话（必填）
# secondary: 工具循环后续轮次（可选，未配置回退到 primary）
# light: 辅助任务（可选，未配置回退到 secondary → primary）

primary:
  # 提供商: gemini | openai-compatible | claude
  provider: gemini
  apiKey: your-api-key-here
  model: gemini-2.0-flash
  baseUrl: https://generativelanguage.googleapis.com
  # 模型上下文窗口大小（token 数，用于 TUI 显示占用比例）
  # 常见模型已有内置默认值，通常无需手动设置
  # contextWindow: 1048576

  # 自定义请求头：会覆盖 provider 内置同名 header
  # headers:
  #   x-goog-api-key: your-override-key
  #   x-custom-header: hello

  # 自定义请求体：会深合并到 provider 编码后的最终请求体，支持嵌套参数
  # 例如 Gemini thinking / 输出长度 / 温度等都可以直接这样配置
  # requestBody:
  #   generationConfig:
  #     maxOutputTokens: 32000
  #     temperature: 1
  #     topP: 1
  #     thinkingConfig:
  #       thinkingBudget: 1228
  #       includeThoughts: true

# secondary:
#   provider: openai-compatible
#   apiKey: your-api-key-here
#   model: gpt-4o
#   baseUrl: https://api.openai.com

# light:
#   provider: gemini
#   apiKey: your-api-key-here
#   model: gemini-2.0-flash
#   baseUrl: https://generativelanguage.googleapis.com
